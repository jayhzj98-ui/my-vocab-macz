<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10年級 6月份英文單字與例句總整理 — 互動複習系統</title>
    <style>
        :root {
            --primary: #2c3e50;
            --primary-light: #34495e;
            --accent-green: #27ae60;
            --accent-orange: #e67e22;
            --bg-main: #f4f6f8;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 24px auto;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.85;
        }

        /* 儀表板與篩選區 */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            display: block; /* WeasyPrint / Fallback safe, but regular web supports block/flex combo */
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stats-container {
            display: table;
            width: 100%;
            margin-bottom: 15px;
        }

        .stat-box {
            display: table-cell;
            width: 33.33%;
            text-align: center;
            padding: 10px;
        }

        .stat-box .num {
            font-size: 24px;
            font-weight: bold;
        }
        #count-total { color: var(--primary); }
        #count-done { color: var(--accent-green); }
        #count-review { color: var(--accent-orange); }

        .stat-box .label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .filter-tabs {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            text-align: center;
        }

        .tab-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            margin: 0 4px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        /* 主要表格區域 */
        .table-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 15px;
        }

        th {
            background-color: #f8fafc;
            color: var(--primary);
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* 單字狀態樣式 */
        tr.status-done {
            background-color: #f0fff4 !important;
        }
        tr.status-review {
            background-color: #fffaf0 !important;
        }

        /* 按鈕與操作樣式 */
        .btn-group {
            display: inline-flex;
            gap: 4px;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            background: #ffffff;
            font-weight: 500;
            transition: all 0.15s;
        }

        .btn-done:hover, .btn-done.active {
            background-color: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .btn-review:hover, .btn-review.active {
            background-color: var(--accent-orange);
            color: white;
            border-color: var(--accent-orange);
        }

        .part-of-speech {
            font-style: italic;
            color: #b33939;
            font-weight: 600;
        }

        .date-badge {
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
        }

        .word-text {
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
        }

        /* 響應式排版（手機端自動優化） */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { 
                display: block; 
            }
            thead tr { 
                position: absolute; 
                top: -9999px; 
                left: -9999px; 
            }
            tr { 
                border: 1px solid var(--border); 
                margin-bottom: 10px; 
                border-radius: 8px;
                padding: 8px;
                background: white;
            }
            td { 
                border: none; 
                border-bottom: 1px dashed #edf2f7; 
                position: relative; 
                padding-left: 35%; 
                text-align: left;
            }
            td:last-child {
                border-bottom: none;
            }
            td:before { 
                position: absolute; 
                top: 14px; 
                left: 16px; 
                width: 30%; 
                padding-right: 10px; 
                white-space: nowrap; 
                font-weight: 600;
                color: var(--text-muted);
                font-size: 13px;
            }
            td:nth-of-type(1):before { content: "日期"; }
            td:nth-of-type(2):before { content: "單字 / 片語"; }
            td:nth-of-type(3):before { content: "詞性 / 解釋"; }
            td:nth-of-type(4):before { content: "英文例句"; }
            td:nth-of-type(5):before { content: "狀態標記"; }
            
            td:before {
                position: absolute;
            }
            .btn-group {
                width: 100%;
            }
            .action-btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>

        // 從 LocalStorage 載入使用者的標記狀態，若無則為空物件
        let userStatus = JSON.parse(localStorage.getItem('vocab_status_2026_06')) || {};
        let currentFilter = 'all';

        // 初始化渲染
        function initTable() {
            const tbody = document.getElementById('vocabulary-tbody');
            tbody.innerHTML = '';

            let lastDate = "";

            vocabData.forEach((item) => {
                const tr = document.createElement('tr');
                tr.id = `row-${item.id}`;
                
                // 加上當前標記的狀態類別
                const status = userStatus[item.id] || 'none';
                if (status !== 'none') {
                    tr.classList.add(`status-${status}`);
                }

                // 日期美化：同一天的日期只顯示一次
                const dateDisplay = (item.date === lastDate) ? '' : `<span class="date-badge">${item.date} 日</span>`;
                lastDate = item.date;

                // 詞性處理
                const posHtml = item.pos ? `<span class="part-of-speech">${item.pos}</span> ` : '';

                tr.innerHTML = `
                    <td>${dateDisplay}</td>
                    <td><span class="word-text">${item.word}</span></td>
                    <td>${posHtml}${item.def}</td>
                    <td>${item.ex}</td>
                    <td>
                        <div class="btn-group">
                            <button class="action-btn btn-done ${status === 'done' ? 'active' : ''}" onclick="toggleStatus('${item.id}', 'done')">已熟記</button>
                            <button class="action-btn btn-review ${status === 'review' ? 'active' : ''}" onclick="toggleStatus('${item.id}', 'review')">需加強</button>
                        </div>
                    </td>
                `;

                tbody.appendChild(tr);
            });

            updateStats();
            applyFilter();
        }

        // 切換單字標記狀態
        window.toggleStatus = function(id, type) {
            const current = userStatus[id];
            
            if (current === type) {
                // 如果點選同一個按鈕，則取消標記 (恢復未標記)
                delete userStatus[id];
            } else {
                // 設定為新狀態
                userStatus[id] = type;
            }

            // 儲存至瀏覽器 local儲存區
            localStorage.setItem('vocab_status_2026_06', JSON.stringify(userStatus));
            
            // 更新畫面特定行與統計資訊
            const tr = document.getElementById(`row-${id}`);
            tr.className = ''; // 清除舊狀態
            
            const btnDone = tr.querySelector('.btn-done');
            const btnReview = tr.querySelector('.btn-review');
            
            btnDone.classList.remove('active');
            btnReview.classList.remove('active');

            const newStatus = userStatus[id] || 'none';
            if (newStatus !== 'none') {
                tr.classList.add(`status-${newStatus}`);
                if (newStatus === 'done') btnDone.classList.add('active');
                if (newStatus === 'review') btnReview.classList.add('active');
            }

            updateStats();
            applyFilter(); // 即時流轉分流
        };

        // 更新數據看板
        function updateStats() {
            let total = vocabData.length;
            let done = 0;
            let review = 0;

            Object.values(userStatus).forEach(status => {
                if (status === 'done') done++;
                if (status === 'review') review++;
            });

            let none = total - done - review;

            // 更新數據區
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-done').innerText = done;
            document.getElementById('count-review').innerText = review;

            // 更新頁籤數量
            document.getElementById('tab-all-count').innerText = total;
            document.getElementById('tab-none-count').innerText = none;
            document.getElementById('tab-done-count').innerText = done;
            document.getElementById('tab-review-count').innerText = review;
        }

        // 切換分流分頁
        window.filterList = function(filterType) {
            currentFilter = filterType;
            
            // 更新按鈕 active 樣式
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            
            // 找到觸發的按鈕加強反饋
            event.currentTarget.classList.add('active');
            
            applyFilter();
        };

        // 執行篩選顯示/隱藏
        function applyFilter() {
            vocabData.forEach(item => {
                const tr = document.getElementById(`row-${item.id}`);
                const status = userStatus[item.id] || 'none';

                if (currentFilter === 'all') {
                    tr.style.display = '';
                } else if (currentFilter === 'none' && status === 'none') {
                    tr.style.display = '';
                } else if (currentFilter === 'done' && status === 'done') {
                    tr.style.display = '';
                } else if (currentFilter === 'review' && status === 'review') {
                    tr.style.display = '';
                } else {
                    tr.style.display = 'none';
                }
            });
        }

        // 啟動
        document.addEventListener('DOMContentLoaded', initTable);
    </script>
